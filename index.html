<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#141210">
<title>VostrumBud — Кошторис</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#f5f3ef; --card:#ffffff; --text:#1c1a17; --muted:#8a8377;
    --line:#e6e2da; --accent:#e08a1e; --accent-soft:#fdf1de; --accent-text:#8a5200;
    --danger:#c0392b; --ok:#2e7d4f; --sheet:#ffffff; --overlay:rgba(20,18,16,.45);
    --shadow:0 4px 24px rgba(28,26,23,.08); --input:#f5f3ef;
  }
  [data-theme="dark"]{
    --bg:#141210; --card:#1e1b18; --text:#f0ece5; --muted:#8d8578;
    --line:#2c2823; --accent:#f0a63c; --accent-soft:#2b2214; --accent-text:#f0a63c;
    --danger:#e05c4c; --ok:#4caf7d; --sheet:#211e1a; --overlay:rgba(0,0,0,.6);
    --shadow:0 4px 24px rgba(0,0,0,.4); --input:#161310;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--text);min-height:100dvh;
    transition:background .25s,color .25s;
  }
  .wrap{max-width:520px;margin:0 auto;padding:12px 16px 130px}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:10px;padding:6px 0 16px}
  .icon-btn{
    width:44px;height:44px;border-radius:14px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:1.15rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);flex:none;
  }
  .topbar .title{flex:1;min-width:0}
  .topbar .title b{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;display:block;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .title b span{color:var(--accent)}
  .topbar .title small{color:var(--muted);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase}

  /* ---------- cards & inputs ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:12px;box-shadow:var(--shadow);margin-bottom:10px;animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fld{margin-bottom:8px}
  .fld label{display:block;font-size:.68rem;color:var(--muted);margin:0 0 3px 4px;font-weight:600;
    text-transform:uppercase;letter-spacing:.04em}
  .fld input,.fld textarea{
    width:100%;border:none;background:var(--input);border-radius:10px;
    padding:11px 12px;font-size:.95rem;color:var(--text);min-height:44px;font-family:inherit;
  }
  .fld textarea{min-height:60px;resize:vertical}
  .fld input::placeholder,.fld textarea::placeholder{color:var(--muted)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .num{text-align:center;font-variant-numeric:tabular-nums}

  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;
    padding:6px 12px;font-size:.78rem;font-weight:700;cursor:pointer;border:1px solid var(--line);
    background:var(--input);color:var(--muted)}
  .chip.st0{color:var(--accent-text);border-color:var(--accent);background:var(--accent-soft)}
  .chip.st1{color:#1461b3;border-color:#1461b3;background:rgba(20,97,179,.1)}
  .chip.st2{color:var(--ok);border-color:var(--ok);background:rgba(46,125,79,.1)}

  /* ---------- room / client list items ---------- */
  .item{display:flex;align-items:center;gap:8px}
  .item .info{flex:1;min-width:0;cursor:pointer;padding:2px 0}
  .item .info b{display:block;font-size:.98rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .info small{color:var(--muted);font-size:.78rem}
  .item .sum{font-weight:800;font-size:.92rem;font-variant-numeric:tabular-nums;white-space:nowrap}
  .mini{border:none;background:none;color:var(--muted);font-size:1.05rem;cursor:pointer;
    width:36px;height:40px;border-radius:10px;flex:none}
  .mini:active{color:var(--accent)}
  .mini.danger:active{color:var(--danger)}

  /* ---------- works ---------- */
  .work-btn{
    text-align:left;border:none;background:var(--input);border-radius:10px;
    padding:11px 12px;font-size:.92rem;color:var(--text);cursor:pointer;
    min-height:44px;line-height:1.25;width:100%;
  }
  .work-btn.placeholder{color:var(--muted)}
  .work-btn .unit-tag{display:block;font-size:.72rem;color:var(--accent-text);margin-top:2px;font-weight:600}
  .row-top{display:grid;grid-template-columns:1fr 34px;gap:8px;align-items:center}
  .dims{display:grid;gap:8px;margin-top:8px}
  .dims.c3{grid-template-columns:1fr 1fr 1fr}
  .dims.c2{grid-template-columns:1fr 1fr}
  .dims.c1{grid-template-columns:1fr}
  .row-sum{margin-top:8px;text-align:right;font-size:.8rem;color:var(--muted);font-variant-numeric:tabular-nums}
  .row-sum b{color:var(--text)}

  .add-btn{
    margin:2px 0 10px;width:100%;padding:13px;border-radius:14px;cursor:pointer;
    border:1.5px dashed var(--line);background:none;color:var(--muted);
    font-size:.95rem;font-weight:600;
  }
  .add-btn:active{border-color:var(--accent);color:var(--accent)}

  .sec-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    font-weight:700;margin:16px 4px 8px;display:flex;justify-content:space-between;align-items:center}

  /* ---------- modifiers ---------- */
  .mods{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .mod-chip{display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);
    color:var(--accent-text);border:1px solid var(--accent);border-radius:999px;
    padding:6px 10px;font-size:.78rem;font-weight:700}
  .mod-chip i{font-style:normal;cursor:pointer;opacity:.7;padding:0 2px}

  /* ---------- footer ---------- */
  .footer{
    position:fixed;bottom:0;left:0;right:0;z-index:10;
    background:var(--card);border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  }
  .footer-inner{max-width:520px;margin:0 auto}
  .footer-row{display:flex;gap:10px;align-items:center}
  .total{flex:1;line-height:1.1}
  .total small{display:block;color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em}
  .total b{font-size:1.35rem;font-weight:800;font-variant-numeric:tabular-nums}
  .total b i{font-style:normal;font-size:.85rem;color:var(--muted);font-weight:600}
  .btn{
    border:none;background:var(--accent);color:#1c1206;font-weight:800;
    padding:12px 16px;border-radius:13px;font-size:.9rem;cursor:pointer;
    box-shadow:0 4px 14px rgba(224,138,30,.3);
  }
  .btn.ghost{background:var(--input);color:var(--text);box-shadow:none;border:1px solid var(--line)}
  .btn:active{transform:scale(.97)}

  /* ---------- drawer ---------- */
  .overlay{position:fixed;inset:0;background:var(--overlay);z-index:20;
    opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;bottom:0;left:0;width:82%;max-width:320px;z-index:22;
    background:var(--sheet);transform:translateX(-102%);transition:transform .25s cubic-bezier(.3,.9,.3,1);
    box-shadow:8px 0 40px rgba(0,0,0,.25);display:flex;flex-direction:column;
    padding:16px 12px calc(16px + env(safe-area-inset-bottom));
  }
  .drawer.open{transform:translateX(0)}
  .drawer h3{font-size:1.05rem;font-weight:800;padding:4px 8px 14px}
  .drawer h3 span{color:var(--accent)}
  .drawer-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .cl-item{padding:10px;border-radius:12px;cursor:pointer;margin-bottom:4px;display:flex;
    align-items:center;gap:8px}
  .cl-item.active{background:var(--accent-soft)}
  .cl-item .info{flex:1;min-width:0}
  .cl-item .info b{display:block;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cl-item .info small{color:var(--muted);font-size:.75rem}

  /* ---------- bottom sheet ---------- */
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:21;
    background:var(--sheet);border-radius:20px 20px 0 0;
    max-height:80dvh;display:flex;flex-direction:column;
    transform:translateY(102%);transition:transform .25s cubic-bezier(.3,.9,.3,1);
    box-shadow:0 -8px 40px rgba(0,0,0,.25);
  }
  .sheet.open{transform:translateY(0)}
  .sheet-head{padding:10px 16px 8px}
  .grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
  .search{width:100%;border:none;background:var(--input);border-radius:12px;
    padding:12px 14px;font-size:1rem;color:var(--text)}
  .search::placeholder{color:var(--muted)}
  .sheet-list{overflow-y:auto;padding:4px 8px calc(16px + env(safe-area-inset-bottom));flex:1;-webkit-overflow-scrolling:touch}
  .cat{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent-text);
    padding:14px 10px 6px;font-weight:700}
  .opt{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:12px 10px;border-radius:10px;cursor:pointer;font-size:.92rem;line-height:1.3}
  .opt:active{background:var(--accent-soft)}
  .opt .price{white-space:nowrap;color:var(--muted);font-size:.82rem;font-variant-numeric:tabular-nums}
  .no-match{padding:24px;text-align:center;color:var(--muted);font-size:.9rem}
  .empty{color:var(--muted);font-size:.88rem;text-align:center;padding:22px 8px}

  /* ---------- print / PDF (captured off-screen via html2canvas, not window.print) ---------- */
  #printArea{position:fixed;left:-9999px;top:0;width:780px;background:#fff;color:#000;
    font-family:Georgia,"Times New Roman",serif;padding:28px;z-index:-1}
  .p-head{display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:3px solid #e08a1e;padding-bottom:12px;margin-bottom:16px}
  .p-head .logo{font-size:24px;font-weight:bold;letter-spacing:-.5px}
  .p-head .logo span{color:#e08a1e}
  .p-head .contact{text-align:right;font-size:12px;line-height:1.5;color:#444}
  .p-meta{font-size:13px;line-height:1.6;margin-bottom:16px;color:#222}
  .p-title{font-size:16px;font-weight:bold;margin:16px 0 8px}
  table.p-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:8px}
  .p-tbl th{background:#f3ede2;text-align:left;padding:7px 9px;border:1px solid #ccc;font-size:11px;
    text-transform:uppercase;letter-spacing:.03em}
  .p-tbl td{padding:7px 9px;border:1px solid #ccc;vertical-align:top}
  .p-tbl td.r{text-align:right;white-space:nowrap}
  .p-room{background:#faf7f0;font-weight:bold}
  .p-totals{margin-top:12px;font-size:14px;text-align:right;line-height:1.8}
  .p-totals b{font-size:18px}
  .p-foot{margin-top:24px;font-size:11px;color:#666;border-top:1px solid #ccc;padding-top:9px;line-height:1.6}
</style>
</head>
<body>

<div class="wrap" id="app"></div>

<div class="footer" id="footer"></div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="sheet" id="sheet"></div>
<div id="printArea"></div>

<script>
/* =====================================================================
   ПРАЙС VostrumBud

   prep:true → підготовчі роботи (на них діють модифікатори «криві стіни»)
   t = тип розмірів:
     "wall" → Довжина+Ширина+Висота кімнати → 2×(Д+Ш)×В − прорізи
     "flat" → Довжина+Ширина → Д×Ш

   ===================================================================== */

    {n:"Закріпити раковину на стіну", p:500, u:"шт", t:"pcs"},
    {n:"Установка сифона", p:300, u:"шт", t:"pcs"},

    {n:"Установка сталевої ванни", p:1000, u:"шт", t:"pcs"},
    {n:"Демонтаж акрилової / сталевої ванни", p:650, u:"шт", t:"pcs"},
    {n:"Установка бойлера (без врізки в стіну)", p:1000, u:"шт", t:"pcs"},
  ]},
  {cat:"Малярні та шпалерні роботи", items:[

    {n:"Поклейка вінілових шпалер на стіни", p:200, u:"м²", t:"wall"},

  {cat:"Штукатурка та шпаклівка", items:[
    {n:"Шпаклівка стін під фарбування", p:180, u:"м²", t:"wall", prep:true},
    {n:"Шпаклівка стелі під фарбування", p:250, u:"м²", t:"flat", prep:true},
    {n:"Шпаклівка стін під поклейку шпалер", p:130, u:"м²", t:"wall", prep:true},

    {n:"Шпаклівка укосів під фарбування", p:140, u:"м²", t:"len", prep:true},

  {cat:"Гіпсокартон", items:[

  ]},
  {cat:"Плитка", items:[

    {n:"Укладання плитки на підлогу 60×60", p:750, u:"м²", t:"flat"},
    {n:"Укладання плитки на стіни (проста укладка)", p:500, u:"м²", t:"wall"},
    {n:"Укладання плитки «кабанчик»", p:400, u:"м.п.", t:"len"},
    {n:"Декоративна гіпсова плитка", p:360, u:"м²", t:"wall"},
    {n:"Поклейка гіпсової цеглинки на стіни", p:400, u:"м²", t:"wall"},
    {n:"Ґрунтовка стяжки під плитку", p:30, u:"м²", t:"flat"},
    {n:"Установка куточків при укладанні плитки", p:90, u:"м.п.", t:"len"},
    {n:"Затирка швів плитки", p:100, u:"м.п.", t:"len"},
    {n:"Затирка швів (напівсуха)", p:135, u:"м.п.", t:"len"},
    {n:"Отвір в плитці під розетку або трубу", p:220, u:"шт", t:"pcs"},
    {n:"Запил і шліфування крайок під 45°", p:320, u:"м.п.", t:"len"},
    {n:"Монтаж керамічних плінтусів", p:180, u:"м.п.", t:"len"},
    {n:"Ревізійний люк з плитки на магнітах (виготовлення+монтаж)", p:800, u:"шт", t:"pcs"},
    {n:"Облицювання плиткою укосу / підвіконня", p:450, u:"м.п.", t:"len"},

  ]},
  {cat:"Підлогові роботи", items:[
    {n:"Укладання ламінату", p:170, u:"м²", t:"flat"},

    {n:"Укладання лінолеуму", p:80, u:"м²", t:"flat"},
    {n:"Укладання ковроліну", p:80, u:"м²", t:"flat"},
    {n:"Чорнова підлога з фанери / OSB", p:120, u:"м²", t:"flat"},
    {n:"Чистова стяжка (залежно від товщини)", p:350, u:"м²", t:"flat"},
    {n:"Самовирівнююча стяжка підлоги", p:150, u:"м²", t:"flat"},
    {n:"Демонтаж стяжки підлоги", p:70, u:"м²", t:"flat"},

  {t:"плінтус", per:40},{t:"багет", per:30},{t:"молдинг", per:30},
  {t:"укосів", per:8},{t:"затирка", per:30},
];

function findTimeRule(workName){
  const n = workName.toLowerCase();
  return TIMES.find(r => n.includes(r.t));
}
/* сумарний час обєкта в людино-днях (+15% люфт) */
function clientDays(c){
  let days = 0;
  c.rooms.forEach(rm=> rm.works.forEach(wk=>{
    if(!wk.w) return;
    const q = qtyOf(rm, wk); if(!(q>0)) return;
    const tr = findTimeRule(wk.w.n);
    if(tr && tr.per>0) days += q/tr.per;
  }));
  return days>0 ? Math.ceil(days*1.15*2)/2 : 0;
}
/* чи можлива механізація для роботи */
function canMech(name){ return /фарбуван|шпаклів|ґрунт/i.test(name); }

/* ---------- V2: звязані роботи та матеріали ---------- */
function findLinkRule(workName){
  const n = workName.toLowerCase();
  return LINKS.find(r => n.includes(r.t));
}
function findWorkInPrice(namePart){
  const q = namePart.toLowerCase();
  for(const g of PRICE) for(const it of g.items)
    if(it.n.toLowerCase().includes(q)) return it;
  return null;
}
function findMatsRule(workName){
  const n = workName.toLowerCase();
  return MATS.find(r => n.includes(r.t));
}
function roomMaterials(rm, tier, markup, reserve){
  const out = {};
  rm.works.forEach(wk=>{
    if(!wk.w) return;
    const q = qtyOf(rm, wk);
    if(!(q>0)) return;
    const rule = findMatsRule(wk.w.n);
    if(!rule) return;
    const mechK = wk.mech ? 1.2 : 1;
    rule.mats.forEach(m=>{
      const amount = q * m.per * mechK * (1 + (reserve||0)/100);
      const key = m.n + "|" + m.u;
      if(!out[key]) out[key] = {n:m.n, u:m.u, amount:0, pack:m.pack||null, price:m.p[tier]};
      out[key].amount += amount;
    });
  });
  return Object.values(out).map(m=>{
    const packs = m.pack ? Math.ceil(m.amount / m.pack) : null;
    const buyQty = packs!==null ? packs*m.pack : Math.ceil(m.amount*100)/100;
    const buy = buyQty * m.price;
    return {...m, packs, buyQty, buy, client: buy*(1+(markup||0)/100)};
  });
}
function clientMaterials(c){
  const tier = (c.tier===undefined?1:c.tier), markup = parseFloat(c.matMarkup)||0, reserve = parseFloat(c.matReserve)||0;
  const agg = {};
  c.rooms.forEach(rm=>{
    roomMaterials(rm, tier, markup, reserve).forEach(m=>{
      const key = m.n+"|"+m.u;
      if(!agg[key]) agg[key] = {...m};
      else{
        agg[key].amount += m.amount;
        agg[key].buyQty += m.buyQty;
        agg[key].buy += m.buy;
        agg[key].client += m.client;
        if(m.packs!==null) agg[key].packs = (agg[key].packs||0)+m.packs;
      }
    });
  });
  return Object.values(agg);
}
function matTotals(c){
  if(c.useMats===false) return {buy:0, client:0, list:[]};
  const list = clientMaterials(c);
  return { buy: list.reduce((a,m)=>a+m.buy,0), client: list.reduce((a,m)=>a+m.client,0), list };
}

const WEEKDAYS = ["неділя","понеділок","вівторок","середа","четвер","п'ятниця","субота"];
function fmtDateTime(iso){
  if(!iso) return "";
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,"0"), mm=String(d.getMonth()+1).padStart(2,"0");
  return `${dd}.${mm}.${d.getFullYear()}, ${WEEKDAYS[d.getDay()]}, ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
const newWork = ()=>({w:null, manual:""});
/* міграція старих даних */
data.clients.forEach(c=>c.rooms.forEach(rm=>{
  if(!rm.d) rm.d={l:"",w:"",h:""};
  if(!rm.ops) rm.ops=[];
  if(parseFloat(rm.openings)>0){ rm.ops.push({name:"Прорізи", w:"", h:"", a:parseFloat(rm.openings)}); rm.openings=""; }
  rm.works.forEach(wk=>{ if(wk.manual===undefined) wk.manual=""; });
}));
/* сумарна площа прорізів кімнати */
function opsArea(rm){
  return (rm.ops||[]).reduce((s,o)=> s + (o.a? o.a : (parseFloat(o.w)||0)*(parseFloat(o.h)||0)), 0);
}

/* ---------- розрахунки ---------- */
function qtyOf(rm, wk){
  if(!wk.w) return 0;
  if(parseFloat(wk.manual)>0) return parseFloat(wk.manual);   // ручний обсяг має пріоритет
  const l=parseFloat(rm.d.l)||0, w=parseFloat(rm.d.w)||0, h=parseFloat(rm.d.h)||0;
  switch(wk.w.t){
    case "wall":{
      if(!(l>0&&w>0&&h>0)) return 0;
      return Math.max(0, 2*(l+w)*h - opsArea(rm));
    }
    case "flat": return (l>0&&w>0)? l*w : 0;
    case "len": return (l>0&&w>0)? 2*(l+w) : 0;   // периметр (плінтус тощо)
    case "pcs": return 1;                          // штучні роботи: 1 шт, більше — вручну
  }
  return 0;
}
function unitPrice(rm, wk){
  if(!wk.w) return 0;
  let p = wk.w.p * (wk.w.coats||1);
  const h = parseFloat(rm.d.h)||0;
  if(wk.w.t==="wall" && h>HIGH_CEIL) p += HIGH_SURCHARGE;
  return p;
}
function modMult(rm, wk){
  let m = 1;
  rm.mods.forEach(md=>{
    if(md.scope==="all" || (md.scope==="prep" && wk.w && wk.w.prep)) m *= (1+md.pct/100);
  });
  return m;
}
function workSum(rm, wk){ return qtyOf(rm,wk)*unitPrice(rm,wk)*modMult(rm,wk); }
function roomSum(rm){ return rm.works.reduce((a,wk)=>a+workSum(rm,wk),0); }
function clientSubtotal(c){ return c.rooms.reduce((a,rm)=>a+roomSum(rm),0); }
function clientTotal(c){ return clientSubtotal(c)*(1+(parseFloat(c.discount)||0)/100); }
function priceNote(rm, wk){
  const parts=[];
  if(wk.w.coats) parts.push("2 шари");
  const h=parseFloat(rm.d.h)||0;
  if(wk.w.t==="wall"&&h>HIGH_CEIL) parts.push(`+${HIGH_SURCHARGE} грн/м² висота`);
  const mm = modMult(rm,wk);
  if(mm!==1) parts.push(`модиф. ×${(Math.round(mm*1000)/1000)}`);
  if(parseFloat(wk.manual)>0) parts.push("обсяг вручну");
  return parts.length? ` (${parts.join(", ")})` : "";
}

let toastTimer=null;
function toast(msg){
  let t=document.getElementById("vbToast");
  if(!t){
    t=document.createElement("div"); t.id="vbToast";
    t.style.cssText="position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:12px;font-size:.85rem;font-weight:600;z-index:40;box-shadow:var(--shadow);max-width:86%;text-align:center;transition:opacity .25s";

  const showArea=()=>{

      if(h>0) s+=` · Стіни: <b>${fmt(Math.max(0,2*(l+w)*h-open))} м²</b>${open?` (мінус ${fmt(open)} м²)`:""}`;

  };

  const opsBox=document.createElement("div");

    rm.ops.forEach((o,i)=>{

      const s=document.createElement("span");
      s.className="mod-chip";
      s.innerHTML=`${esc(o.name)}${o.dims?` ${o.dims} м`:(o.a?"":` ${o.w}×${o.h} м`)} = ${fmt(a)} м² <i>✕</i>`;
      s.querySelector("i").onclick=()=>{
        rm.ops.splice(i,1); save(); renderOpChips(); showArea(); updateWorkSums(rm); updateFooter();
      };
      opsBox.appendChild(s);
    });
  }
  renderOpChips();
  ot.querySelector("#addOp").onclick=()=>openOpSheet(rm, ()=>{ renderOpChips(); showArea(); updateWorkSums(rm); updateFooter(); });

  addW.textContent="＋ Обрати роботу з прайсу";
  addW.onclick=()=>{
    rm.works.push(newWork()); save();
    renderRoom();
    setTimeout(()=>openWorkSheet(rm, rm.works.length-1),50);
  };
  app.appendChild(addW);

  const list=document.createElement("div"); list.id="workList";
  app.appendChild(list);
  rm.works.forEach((wk,i)=> list.appendChild(workRow(rm,wk,i)));
  if(!rm.works.length){
    const em=document.createElement("div"); em.className="empty";
    em.textContent="Натисни кнопку вище — відкриється прайс, вибери роботу, і вона порахується з розмірів кімнати.";
    list.appendChild(em);

  /* --- модифікатори --- */

    <textarea id="rNotes" placeholder="стіни криві, треба маяки…">${esc(rm.notes)}</textarea></div>`;
  nt.querySelector("#rNotes").oninput=e=>{ rm.notes=e.target.value; save(); };
  app.appendChild(nt);

  footer.innerHTML=`<div class="footer-inner"><div class="footer-row">
    <div class="total"><small>Разом: ${esc(rm.name)}</small><b id="fTotal">${fmt(roomSum(rm))} <i>грн</i></b></div>
    <button class="btn" id="btnBack">Готово</button>
  </div></div>`;
  document.getElementById("btnBack").onclick=()=>renderClient();

/* спливаюче вікно додавання прорізу: назва + ширина + висота */
function openOpSheet(rm, after){
  sheet.innerHTML=`<div class="sheet-head"><div class="grip"></div>
    <div style="font-weight:800;padding:0 4px 10px">Додати проріз</div>
    <input class="search" id="opName" placeholder="Двері, вікно, арка…" style="margin-bottom:8px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="fld" style="margin:0"><label>Ширина, м</label>
        <input class="search num" id="opW" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.9"></div>
      <div class="fld" style="margin:0"><label>Висота, м</label>
        <input class="search num" id="opH" type="number" inputmode="decimal" min="0" step="0.01" placeholder="2.05"></div>
      <div class="fld" style="margin:0"><label>Довжина, м</label>
        <input class="search num" id="opL" type="number" inputmode="decimal" min="0" step="0.01" placeholder="—"></div>
    </div>
    <div class="row-sum" id="opArea" style="text-align:left;margin-top:6px"></div>
    <div style="display:flex;gap:8px;padding:12px 0 16px">
      <button class="btn ghost" style="flex:1" id="opCancel">Скасувати</button>
      <button class="btn" style="flex:1" id="opOk">Додати</button>
    </div></div>`;
  const nameI=sheet.querySelector("#opName"), wI=sheet.querySelector("#opW"), hI=sheet.querySelector("#opH"), lI=sheet.querySelector("#opL");
  const areaBox=sheet.querySelector("#opArea");
  const calcOp=()=>{
    const vals=[wI.value,hI.value,lI.value].map(v=>parseFloat(v)).filter(v=>v>0);
    return vals.length>=2 ? vals.reduce((a,v)=>a*v,1) : 0;
  };
  const upd=()=>{
    const a=calcOp();
    areaBox.innerHTML = a>0? `= <b>${fmt(a)} м²</b> буде віднято від площі стін` : `<span style="color:var(--muted)">впиши хоча б два розміри</span>`;
  };
  wI.oninput=upd; hI.oninput=upd; lI.oninput=upd;
  sheet.querySelector("#opOk").onclick=()=>{
    const a=calcOp();
    if(!(a>0)){ toast("Впиши хоча б два розміри прорізу."); return; }
    const dims=[wI.value,hI.value,lI.value].filter(v=>parseFloat(v)>0).join("×");
    rm.ops.push({name:nameI.value.trim()||"Проріз", w:"", h:"", a:a, dims:dims});
    save(); closeAll(); if(after) after();
  };
  sheet.querySelector("#opCancel").onclick=closeAll;
  overlay.classList.add("open"); sheet.classList.add("open");
  setTimeout(()=>{ if(document.body.contains(nameI)) nameI.focus(); },250);
}

function renderModChips(rm){

  box.innerHTML = rm.mods.length? "" : `<span style="color:var(--muted);font-size:.82rem">немає — звичайні умови</span>`;
  rm.mods.forEach((md,i)=>{
    const s=document.createElement("span");
    s.className="mod-chip";
    s.innerHTML=`${esc(md.name)} +${md.pct}% <i>✕</i>`;
    s.querySelector("i").onclick=()=>{
      rm.mods.splice(i,1); save(); renderModChips(rm); updateWorkSums(rm); updateFooter();

function workRow(rm, wk, idx){
  const el=document.createElement("div");
  el.className="card";
  el.innerHTML=`
    <div class="row-top">
      <button class="work-btn ${wk.w?"":"placeholder"}">
        ${wk.w? esc(wk.w.n)+`<span class="unit-tag">${wk.w.p*(wk.w.coats||1)} грн/${wk.w.u}${wk.w.coats?" · 2 шари":""}</span>` : "Обрати роботу…"}
      </button>
      <button class="mini danger">✕</button>
    </div>
    ${wk.w?`<div class="dims c1" style="margin-top:8px">
      <div class="fld" style="margin:0"><label>${wk.w.t==="pcs"?"Кількість, шт (порожньо = 1)":"Обсяг вручну, "+wk.w.u+" (порожньо = з розмірів кімнати)"}</label>
        <input type="number" class="num" inputmode="decimal" min="0" step="0.01" id="wManual" placeholder="${wk.w.t==="pcs"?"1":"авто"}" value="${wk.manual}">
      </div></div>`:""}
    ${wk.w&&canMech(wk.w.n)?`<label style="display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);margin-top:8px;cursor:pointer">
      <input type="checkbox" id="wMech" ${wk.mech?"checked":""} style="width:17px;height:17px"> Механічне нанесення (апаратом, +20% матеріалу)
    </label>`:""}
    <div class="row-sum" style="display:none"></div>`;
  el.querySelector(".work-btn").onclick=()=>openWorkSheet(rm, idx);
  const man=el.querySelector("#wManual");
  if(man) man.oninput=()=>{ wk.manual=man.value; save(); refreshWorkSum(el,rm,wk); updateFooter(); };
  const mech=el.querySelector("#wMech");
  if(mech) mech.onchange=()=>{ wk.mech=mech.checked; save(); updateFooter(); };
  el.querySelector(".danger").onclick=()=>{
    rm.works.splice(idx,1); save(); renderRoom();
  };
  refreshWorkSum(el,rm,wk);
  return el;
}
function refreshWorkSum(el,rm,wk){
  const s=el.querySelector(".row-sum");
  const q=qtyOf(rm,wk);
  if(wk.w&&q>0){
    s.style.display="";
    s.innerHTML=`${fmt(q)} ${wk.w.u} × ${fmt(unitPrice(rm,wk))} грн${priceNote(rm,wk)} = <b>${fmt(workSum(rm,wk))}</b> грн`;
  } else if(wk.w){
    s.style.display="";
    s.innerHTML=`<span style="color:var(--muted)">впиши розміри кімнати вище або обсяг вручну</span>`;
  } else s.style.display="none";
}
function updateWorkSums(rm){
  const list=document.getElementById("workList");
  if(!list) return;
  [...list.children].forEach((el,i)=>{
    if(rm.works[i]) refreshWorkSum(el,rm,rm.works[i]);
  });
}
function updateFooter(){
  const t=document.getElementById("fTotal");
  if(!t) return;
  if(view.roomId) t.innerHTML = fmt(roomSum(room())) + " <i>грн</i>";
  else{
    const c = client();
    t.innerHTML = fmt(clientTotal(c) + matTotals(c).client) + " <i>грн</i>";
  }
}

/* =====================================================================
   SHEET — вибір роботи
   ===================================================================== */
function openWorkSheet(rm, idx){
  sheet.innerHTML=`<div class="sheet-head"><div class="grip"></div>
    <input class="search" id="wSearch" placeholder="Почни писати назву роботи…" style="margin-bottom:8px">
    <button class="btn ghost" style="width:100%" id="wCustom">✎ Додати свою роботу вручну</button></div>

  const listEl=sheet.querySelector("#wList");
  const searchEl=sheet.querySelector("#wSearch");
  sheet.querySelector("#wCustom").onclick=()=>openCustomWorkSheet(rm, idx);
  function renderOpts(q){
    listEl.innerHTML=""; let any=false;
    PRICE.forEach(g=>{
      const ms=g.items.filter(it=>!q||it.n.toLowerCase().includes(q));
      if(!ms.length) return;
      any=true;
      const cat=document.createElement("div"); cat.className="cat"; cat.textContent=g.cat;
      listEl.appendChild(cat);
      ms.forEach(it=>{
        const o=document.createElement("div"); o.className="opt";
        o.innerHTML=`<span>${esc(it.n)}${it.coats?" · 2 шари":""}</span><span class="price">${it.p*(it.coats||1)} грн/${it.u}</span>`;
        o.onclick=()=>{
          rm.works[idx].w={...it};
          rm.works[idx].manual="";

      });

  renderOpts("");
  overlay.classList.add("open");
  sheet.classList.add("open");
  setTimeout(()=>{ if(document.body.contains(searchEl)) searchEl.focus(); },250);
}


/* SHEET — пропозиція звязаних робіт після вибору основної */
function openLinksSheet(rm, rule, mainName){
  const already = new Set(rm.works.filter(w=>w.w).map(w=>w.w.n));
  const cand = [];
  (rule.add||[]).forEach(part=>{
    const it = findWorkInPrice(part);
    if(it && !already.has(it.n) && !cand.find(c=>c.it.n===it.n)) cand.push({it, sel:true, yes:false});
  });
  const yesCand = [];
  if(rule.q) (rule.addYes||[]).forEach(part=>{
    const it = findWorkInPrice(part);
    if(it && !already.has(it.n) && !yesCand.find(c=>c.it.n===it.n)) yesCand.push({it, sel:true});
  });
  if(!cand.length && !yesCand.length){ renderRoom(); return; }
  let qAnswer = false;
  sheet.innerHTML=`<div class="sheet-head"><div class="grip"></div>
    <div style="font-weight:800;padding:0 4px 4px">Разом з цією роботою зазвичай ідуть:</div>
    <div style="font-size:.78rem;color:var(--muted);padding:0 4px 8px">Зніми галочки з зайвого — обране додасться в кімнату.</div></div>
    <div class="sheet-list" id="lnList"></div>
    <div style="display:flex;gap:8px;padding:12px 16px calc(16px + env(safe-area-inset-bottom))">
      <button class="btn ghost" style="flex:1" id="lnSkip">Нічого не треба</button>
      <button class="btn" style="flex:1" id="lnOk">Додати обрані</button>
    </div>`;
  const list = sheet.querySelector("#lnList");
  cand.forEach((c,i)=>{
    const row=document.createElement("div"); row.className="opt";
    row.innerHTML=`<label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer">
      <input type="checkbox" checked style="width:18px;height:18px;flex:none">
      <span>${esc(c.it.n)}</span></label>
      <span class="price">${c.it.p*(c.it.coats||1)} грн/${c.it.u}</span>`;
    row.querySelector("input").onchange=e=>{ c.sel=e.target.checked; };
    list.appendChild(row);
  });
  if(rule.q && yesCand.length){
    const qRow=document.createElement("div");
    qRow.style.cssText="padding:12px 10px;border-top:1px solid var(--line);margin-top:6px";
    qRow.innerHTML=`<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:700;font-size:.9rem">
      <input type="checkbox" id="lnQ" style="width:18px;height:18px;flex:none"> ${esc(rule.q)}</label>
      <div id="lnYesBox" style="display:none;margin-top:8px"></div>`;
    list.appendChild(qRow);
    const yesBox = qRow.querySelector("#lnYesBox");
    yesCand.forEach(c=>{
      const r=document.createElement("div"); r.className="opt";
      r.innerHTML=`<span>+ ${esc(c.it.n)}</span><span class="price">${c.it.p*(c.it.coats||1)} грн/${c.it.u}</span>`;
      yesBox.appendChild(r);
    });
    qRow.querySelector("#lnQ").onchange=e=>{
      qAnswer = e.target.checked;
      yesBox.style.display = qAnswer? "" : "none";
    };
  }
  sheet.querySelector("#lnOk").onclick=()=>{
    let n=0;
    cand.filter(c=>c.sel).forEach(c=>{ rm.works.push({w:{...c.it}, manual:""}); n++; });
    if(qAnswer) yesCand.forEach(c=>{ rm.works.push({w:{...c.it}, manual:""}); n++; });
    save(); closeAll(); renderRoom();
    if(n) toast(`Додано ${n} звязаних робіт`);
  };
  sheet.querySelector("#lnSkip").onclick=()=>{ closeAll(); renderRoom(); };
  overlay.classList.add("open"); sheet.classList.add("open");
}

/* SHEET — своя робота вручну: назва, ціна, тип виміру, опційно зберегти в прайс */

    </label>
    <div style="display:flex;gap:8px;padding:0 0 16px">
      <button class="btn ghost" style="flex:1" id="cwCancel">Скасувати</button>

/* SHEET — вибір модифікатора */
function openModSheet(rm){

const TYPE_OPTS = [
  {val:"wall", label:"м² — стіни кімнати", u:"м²"},
  {val:"flat", label:"м² — підлога / стеля", u:"м²"},
  {val:"len",  label:"м.п. — периметр кімнати", u:"м.п."},
  {val:"pcs",  label:"шт — за одиницю", u:"шт"},
];
function typeChipsHtml(sel, idPrefix){
  return `<div class="fld"><label>Як рахувати обсяг</label>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
    ${TYPE_OPTS.map(o=>`<span class="chip ${o.val===sel?"st0":""}" data-t="${o.val}" id="${idPrefix}_${o.val}">${o.label}</span>`).join("")}
    </div></div>`;
}
function wireTypeChips(container, idPrefix, initial, onPick){
  let cur = initial;
  TYPE_OPTS.forEach(o=>{
    const el = container.querySelector(`#${idPrefix}_${o.val}`);
    el.onclick=()=>{
      cur=o.val;
      TYPE_OPTS.forEach(oo=> container.querySelector(`#${idPrefix}_${oo.val}`).className = "chip"+(oo.val===cur?" st0":""));
      onPick(cur);
    };
  });
  return ()=>cur;
}

function renderPriceList(){
  app.innerHTML="";
  app.appendChild(topbar("Прайс", `${PRICE.reduce((a,g)=>a+g.items.length,0)} позицій`, ()=>renderClient()));

  const tools=document.createElement("div");
  tools.className="card";
  tools.innerHTML=`
    <input class="search" id="pSearch" placeholder="Пошук по назві…" style="margin-bottom:10px">
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" id="pAdd">+ Додати роботу</button>
      <button class="btn ghost" style="flex:1" id="pImport">⇪ Імпорт з файлу</button>
    </div>`;
  app.appendChild(tools);
  tools.querySelector("#pAdd").onclick=()=>openPriceItemSheet(null,null,()=>renderPriceList());
  tools.querySelector("#pImport").onclick=()=>openImportSheet(()=>renderPriceList());

  const listBox=document.createElement("div");
  app.appendChild(listBox);
  function draw(q){
    listBox.innerHTML="";
    let any=false;
    PRICE.forEach((g,gi)=>{
      const items=g.items.map((it,ii)=>({it,ii})).filter(x=>!q||x.it.n.toLowerCase().includes(q));
      if(!items.length) return;
      any=true;
      const t=document.createElement("div"); t.className="sec-title"; t.textContent=g.cat;
      listBox.appendChild(t);
      items.forEach(({it,ii})=>{
        const row=document.createElement("div");
        row.className="card item";
        row.innerHTML=`
          <div class="info">
            <b>${esc(it.n)}${it.coats?" · 2 шари":""}</b>
            <small>${it.p*(it.coats||1)} грн / ${it.u}</small>
          </div>
          <button class="mini" title="Редагувати">✎</button>
          <button class="mini danger" title="Видалити">✕</button>`;
        row.querySelector(".mini:not(.danger)").onclick=()=>openPriceItemSheet(gi,ii,()=>{draw(q);});
        row.querySelector(".danger").onclick=()=>{
          askConfirm(`Видалити «${it.n}» з прайсу?`,()=>{
            g.items.splice(ii,1);
            if(!g.items.length) PRICE.splice(gi,1);
            savePrice(); draw(q);
          });
        };
        listBox.appendChild(row);
      });
    });
    if(!any) listBox.innerHTML=`<div class="empty">Нічого не знайдено${q?` за «${esc(q)}»`:""}.</div>`;
  }
  draw("");
  tools.querySelector("#pSearch").oninput=e=>draw(e.target.value.trim().toLowerCase());

  footer.innerHTML=`<div class="footer-inner"><div class="footer-row">
    <div class="total"><small>Категорій: ${PRICE.length}</small><b>${PRICE.reduce((a,g)=>a+g.items.length,0)} робіт</b></div>
    <button class="btn" id="btnPBack">Готово</button>
  </div></div>`;
  document.getElementById("btnPBack").onclick=()=>renderClient();
}

    <div class="grid2">

      <div class="fld"><label>Категорія</label>
        <select id="iCat" style="width:100%;border:none;background:var(--input);border-radius:10px;padding:11px 12px;font-size:.95rem;color:var(--text);min-height:44px">
          ${catNames.map((c,i)=>`<option value="${i}" ${!isNew&&i===gi?"selected":""}>${esc(c)}</option>`).join("")}
          <option value="new">+ Нова категорія…</option>

    </div>

      <input type="checkbox" id="iCoats" ${cur.coats?"checked":""} style="width:18px;height:18px"> Рахувати у 2 шари (ціна автоматично ×2)
    </label>

      <button class="btn ghost" style="flex:1" id="iCancel">Скасувати</button>

/* ---------- імпорт прайсу: вставка тексту або файл .docx / .txt / .csv ---------- */
function parsePriceText(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const out=[];
  const re = /^(.+?)\s*[—\-–]\s*(\d+(?:[.,]\d+)?)(?:\s*[-–]\s*(\d+(?:[.,]\d+)?))?\s*грн(?:\s*\/?\s*(?:метр\s*)?(квадратн\w*|погонн\w*|штук\w*))?/iu;
  lines.forEach(line=>{
    const m = line.match(re);
    if(!m) return;
    const name = m[1].replace(/[🔧🎨🏗️🧱🪟🪵🪞🏠🚪]/gu,"").trim();
    if(!name || name.length<3) return;
    let p1=parseFloat(m[2].replace(",", ".")), p2 = m[3]?parseFloat(m[3].replace(",", ".")):null;
    const price = p2? Math.round((p1+p2)/2) : Math.round(p1);
    let t="pcs", u="шт";
    const unitWord=(m[4]||"").toLowerCase();
    if(unitWord.startsWith("квадрат")){ t="flat"; u="м²"; }
    else if(unitWord.startsWith("погон")){ t="len"; u="м.п."; }
    out.push({n:name, p:price, u, t, sel:true});
  });
  return out;
}
function openImportSheet(after){
  sheet.innerHTML=`<div class="sheet-head"><div class="grip"></div>
    <div style="font-weight:800;padding:0 4px 6px">Імпорт прайсу</div>
    <div style="font-size:.8rem;color:var(--muted);padding:0 4px 10px;line-height:1.4">
      Завантаж .docx / .txt файл, або відкрий Word/PDF на телефоні, виділи текст прайсу, скопіюй і встав нижче.
    </div>
    <input type="file" id="iFile" accept=".docx,.txt,.csv" style="margin:0 4px 10px;font-size:.85rem;color:var(--text)">
    <textarea id="iText" placeholder="Встав сюди текст прайсу — рядки виду «Назва — 250 грн / метр квадратний»" style="width:100%;min-height:140px;border:none;background:var(--input);border-radius:10px;padding:11px 12px;font-size:.85rem;color:var(--text);font-family:inherit"></textarea>
    <div style="display:flex;gap:8px;padding:12px 0 16px">
      <button class="btn ghost" style="flex:1" id="iCancel">Скасувати</button>
      <button class="btn" style="flex:1" id="iParse">Розпізнати рядки</button>
    </div></div>`;
  const fileEl=sheet.querySelector("#iFile"), textEl=sheet.querySelector("#iText");
  fileEl.onchange=async ()=>{
    const f=fileEl.files[0];
    if(!f) return;
    try{
      if(f.name.toLowerCase().endsWith(".docx")){
        if(!window.JSZip){ toast("Немає інтернету — не вдалось завантажити читач .docx."); return; }
        const zip = await JSZip.loadAsync(f);
        const xml = await zip.file("word/document.xml").async("string");
        const withBreaks = xml.replace(/<\/w:p>/g,"\n").replace(/<[^>]+>/g,"");
        const decoded = withBreaks.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'");
        textEl.value = decoded;
      } else {
        textEl.value = await f.text();
      }
      toast("Файл прочитано — перевір текст і тисни «Розпізнати рядки»");
    }catch(e){ toast("Не вдалося прочитати файл."); }
  };
  sheet.querySelector("#iParse").onclick=()=>{
    const items = parsePriceText(textEl.value);
    if(!items.length){ toast("Не знайшов жодного рядка у форматі «Назва — ціна грн»."); return; }
    openImportReviewSheet(items, after);
  };
  sheet.querySelector("#iCancel").onclick=closeAll;
  overlay.classList.add("open"); sheet.classList.add("open");
}

    row.querySelector(`#sel${i}`).onchange=e=>{ it.sel=e.target.checked; };

  });
  sheet.querySelector("#rOk").onclick=()=>{
    const catVal=sheet.querySelector("#rCat").value;
    let targetGi;
    if(catVal==="new"){

      if(idx<0){ PRICE.push({cat:"Імпортовано", items:[]}); idx=PRICE.length-1; }

    items.filter(it=>it.sel).forEach(it=>{
      PRICE[targetGi].items.push({n:it.n, p:it.p, u:it.u, t:it.t}); n++;
    });
    savePrice(); closeAll();
    toast(`Додано ${n} робіт у прайс`);

  sheet.querySelector("#rCancel").onclick=closeAll;
  overlay.classList.add("open"); sheet.classList.add("open");
}

/* ---------- Резервна копія: справжній файл на телефоні, незалежний від кешу застосунку ---------- */
function collectBackup(){
  return {
    app: "VostrumBud", version: 1, exportedAt: new Date().toISOString(),
    data, PRICE, LINKS, MATS, TIMES, theme: root.getAttribute("data-theme")
  };
}
function openBackupSheet(){
  const clientsN = data.clients.length;
  const roomsN = data.clients.reduce((a,c)=>a+c.rooms.length,0);
  sheet.innerHTML=`<div class="sheet-head"><div class="grip"></div>
    <div style="font-weight:800;padding:0 4px 6px">Резервна копія</div>
    <div style="font-size:.8rem;color:var(--muted);padding:0 4px 14px;line-height:1.5">
      Зберігає ВСЕ: клієнтів, кімнати, прайс, норми і правила — в один файл на телефоні.
      Цей файл переживе видалення застосунку. Зараз у тебе: ${clientsN} клієнт(и), ${roomsN} кімнат.
    </div>
    <button class="btn" style="width:100%;margin-bottom:10px" id="bkExport">⬇ Зберегти файл на телефон</button>
    <div style="font-size:.78rem;color:var(--muted);padding:14px 4px 6px;border-top:1px solid var(--line)">Відновити з файлу:</div>
    <input type="file" id="bkFile" accept=".json" style="margin:4px 4px 10px;font-size:.85rem;color:var(--text)">
    <div style="display:flex;gap:8px;padding:8px 0 16px">
      <button class="btn ghost" style="flex:1" id="bkCancel">Закрити</button>
    </div></div>`;
  sheet.querySelector("#bkExport").onclick=()=>{
    const blob = new Blob([JSON.stringify(collectBackup(), null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const d0 = new Date();
    const fname = `vostrumbud-backup-${d0.getFullYear()}-${String(d0.getMonth()+1).padStart(2,"0")}-${String(d0.getDate()).padStart(2,"0")}.json`;
    const a = document.createElement("a");
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
    toast("Файл збережено — перевір папку Завантаження");
  };
  sheet.querySelector("#bkFile").onchange=async()=>{
    const f = sheet.querySelector("#bkFile").files[0];
    if(!f) return;
    try{
      const json = JSON.parse(await f.text());
      if(!json || !json.data || !Array.isArray(json.data.clients)){ toast("Це не файл резервної копії VostrumBud."); return; }
      askConfirm(`Відновити з файлу від ${fmtDateTime(json.exportedAt)}? Це замінить усі поточні дані.`, ()=>{
        data = json.data;
        if(json.PRICE) PRICE = json.PRICE;
        if(json.LINKS) LINKS = json.LINKS;
        if(json.MATS) MATS = json.MATS;
        if(json.TIMES) TIMES = json.TIMES;
        save(); savePrice(); saveLinks(); saveMats(); saveTimes();
        if(json.theme) applyTheme(json.theme);
        view.clientId = data.clients[0]?.id || null; view.roomId = null;
        closeAll(); renderClient();
        toast("Відновлено з резервної копії");
      });
    }catch(e){ toast("Не вдалося прочитати файл."); }
  };
  sheet.querySelector("#bkCancel").onclick=closeAll;
  overlay.classList.add("open"); sheet.classList.add("open");
}

/* ---------- парсер CSV/TSV: підтримує кому, крапку з комою, таб ---------- */
function parseDelimited(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return [];
  const delim = lines[0].includes(";") ? ";" : (lines[0].includes("\t") ? "\t" : ",");
  return lines.map(l=> l.split(delim).map(c=>c.trim().replace(/^"|"$/g,"")));
}
function looksLikeHeader(cells){
  return /робот|матеріал|назв|трigger|тригер|норм|цін|одиниц/i.test(cells.join(" "));
}

function renderRules(){
  app.innerHTML="";
  app.appendChild(topbar("Норми і правила","матеріали · звязки · час",()=>renderClient()));

  const tabs=document.createElement("div");
  tabs.className="card"; tabs.style.cssText="display:flex;gap:6px;padding:8px";
  tabs.innerHTML=`<span class="chip st0" data-tab="0" style="flex:1;justify-content:center">Матеріали</span>
    <span class="chip" data-tab="1" style="flex:1;justify-content:center">Звязки</span>
    <span class="chip" data-tab="2" style="flex:1;justify-content:center">Час</span>`;
  app.appendChild(tabs);

  const toolbar=document.createElement("div");
  toolbar.className="card"; toolbar.style.cssText="display:flex;gap:8px";
  app.appendChild(toolbar);

  const body=document.createElement("div"); app.appendChild(body);
  let cur=0;
  tabs.querySelectorAll("[data-tab]").forEach(ch=>{
    ch.onclick=()=>{ cur=+ch.dataset.tab;
      tabs.querySelectorAll("[data-tab]").forEach(c2=>c2.className="chip"+(+c2.dataset.tab===cur?" st0":""));
      draw(); };
  });

  function drawToolbar(){
    const labels = ["+ Нова робота (матеріали)","+ Нове правило звязки","+ Нова норма часу"];
    toolbar.innerHTML = `
      <button class="btn" style="flex:1" id="rAdd">${labels[cur]}</button>
      <button class="btn ghost" style="flex:1" id="rImport">⇪ Імпорт з файлу</button>`;
    toolbar.querySelector("#rAdd").onclick=()=>{
      if(cur===0) openMatWorkEdit(null, draw);
      if(cur===1) openLinkEdit(null, draw);
      if(cur===2) openTimeEdit(null, draw);
    };
    toolbar.querySelector("#rImport").onclick=()=>openRulesImportSheet(cur, draw);
  }

  function draw(){
    drawToolbar();
    body.innerHTML="";
    if(cur===0){ /* МАТЕРІАЛИ */
      if(!MATS.length) body.innerHTML=`<div class="empty">Ще немає жодної роботи з матеріалами.</div>`;
      MATS.forEach((r,ri)=>{
        const card=document.createElement("div"); card.className="card";
        const head=document.createElement("div");
        head.className="item"; head.style.marginBottom = r.mats.length? "4px" : "0";
        head.innerHTML=`<div class="info"><b style="font-size:.92rem">${esc(r.t)}</b>
          <small>${r.mats.length} матеріал${r.mats.length===1?"":"и"}${r.note?" · "+esc(r.note):""}</small></div>
          <button class="mini" title="Додати матеріал">＋</button>
          <button class="mini danger" title="Видалити роботу">✕</button>`;
        head.querySelector(".mini:not(.danger)").onclick=()=>openMatItemEdit(ri,null,draw);
        head.querySelector(".danger").onclick=()=>askConfirm(`Видалити роботу «${r.t}» з бази матеріалів?`,()=>{
          MATS.splice(ri,1); saveMats(); draw();
        });
        card.appendChild(head);
        r.mats.forEach((m,mi)=>{
          const row=document.createElement("div");
          row.style.cssText="display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-top:1px solid var(--line);font-size:.83rem;align-items:center";
          row.innerHTML=`<span style="flex:1">${esc(m.n)}</span>

            <button class="mini">✎</button>`;
          row.querySelector(".mini").onclick=()=>openMatItemEdit(ri,mi,draw);
          card.appendChild(row);
        });
        body.appendChild(card);
      });
    }
    if(cur===1){ /* ЗВЯЗКИ */
      if(!LINKS.length) body.innerHTML=`<div class="empty">Ще немає жодного правила.</div>`;
      LINKS.forEach((r,ri)=>{
        const card=document.createElement("div"); card.className="card item";
        card.innerHTML=`<div class="info"><b style="font-size:.9rem">${esc(r.t)}</b>
          <small>→ ${esc(r.add.join(", "))}${r.q?`<br>❓ ${esc(r.q)} → ${esc((r.addYes||[]).join(", "))}`:""}</small></div>
          <button class="mini">✎</button><button class="mini danger">✕</button>`;
        card.querySelector(".mini:not(.danger)").onclick=()=>openLinkEdit(ri,draw);
        card.querySelector(".danger").onclick=()=>askConfirm(`Видалити правило «${r.t}»?`,()=>{
          LINKS.splice(ri,1); saveLinks(); draw(); });
        body.appendChild(card);
      });
    }
    if(cur===2){ /* ЧАС */
      const hint=document.createElement("div");
      hint.className="empty"; hint.style.cssText="padding:10px;text-align:left";
      hint.textContent="Скільки одиниць роботи (м²/м.п.) робить 1 людина за день.";
      body.appendChild(hint);
      TIMES.forEach((r,ri)=>{
        const card=document.createElement("div"); card.className="card item";
        card.innerHTML=`<div class="info"><b style="font-size:.9rem">${esc(r.t)}</b>
          <small>${r.per} од./день на людину</small></div>
          <button class="mini">✎</button><button class="mini danger">✕</button>`;
        card.querySelector(".mini:not(.danger)").onclick=()=>openTimeEdit(ri,draw);
        card.querySelector(".danger").onclick=()=>askConfirm(`Видалити норму «${r.t}»?`,()=>{
          TIMES.splice(ri,1); saveTimes(); draw(); });
        body.appendChild(card);
      });
    }
  }
  draw();
  footer.innerHTML=`<div class="footer-inner"><div class="footer-row">
    <div class="total"><small>Редагуй сміливо</small><b>Твої норми</b></div>
    <button class="btn" id="btnRBack">Готово</button></div></div>`;
  document.getElementById("btnRBack").onclick=()=>renderClient();
}

      <div class="fld"><label>Дорогий, грн</label><input class="search num" id="meP2" type="number" step="0.1" value="${m.p[2]}"></div>
    </div>
    <div style="display:flex;gap:8px;padding:8px 0 16px">

/* ---------- Імпорт CSV/Excel-експорту для матеріалів/звязок/часу ---------- */
function rulesImportHint(tab){
  return [
    "Колонки: Робота; Матеріал; Одиниця; Витрата; Фасовка; Дешевий; Оптимальний; Дорогий",
    "Колонки: Тригер; Запропонувати (через кому); Питання; ЯкщоТак (через кому)",
    "Колонки: Робота; НормаНаДень",
  ][tab];
}
function openRulesImportSheet(tab, after){
  sheet.innerHTML=`<div class="sheet-head"><div class="grip"></div>
    <div style="font-weight:800;padding:0 4px 6px">Імпорт із файлу</div>
    <div style="font-size:.78rem;color:var(--muted);padding:0 4px 10px;line-height:1.4">
      Excel/Google Таблиці → «Зберегти як CSV» → завантаж файл нижче, або встав текст напряму.<br>${rulesImportHint(tab)}
    </div>
    <input type="file" id="riFile" accept=".csv,.txt,.tsv" style="margin:0 4px 10px;font-size:.85rem;color:var(--text)">
    <textarea id="riText" placeholder="Встав сюди рядки таблиці…" style="width:100%;min-height:130px;border:none;background:var(--input);border-radius:10px;padding:11px 12px;font-size:.85rem;color:var(--text);font-family:inherit"></textarea>
    <div style="display:flex;gap:8px;padding:12px 0 16px">
      <button class="btn ghost" style="flex:1" id="riCancel">Скасувати</button>
      <button class="btn" style="flex:1" id="riGo">Додати з файлу</button>
    </div></div>`;
  const fileEl=sheet.querySelector("#riFile"), textEl=sheet.querySelector("#riText");
  fileEl.onchange=async()=>{
    const f=fileEl.files[0]; if(!f) return;
    try{ textEl.value = await f.text(); toast("Файл прочитано"); }
    catch(e){ toast("Не вдалося прочитати файл."); }
  };
  sheet.querySelector("#riGo").onclick=()=>{
    const rows = parseDelimited(textEl.value);
    if(!rows.length){ toast("Порожньо."); return; }
    const dataRows = looksLikeHeader(rows[0]) ? rows.slice(1) : rows;
    let n=0;
    if(tab===0){
      dataRows.forEach(c=>{
        if(c.length<4) return;
        const [wt, mn, u, per, pack, p0, p1, p2] = c;
        if(!wt||!mn) return;
        const key = wt.trim().toLowerCase();
        let rule = MATS.find(r=>r.t===key);
        if(!rule){ rule={t:key, mats:[]}; MATS.push(rule); }
        const item = {
          n: mn.trim(), u: (u||"шт").trim(), per: parseFloat(per)||1,
          p: [parseFloat(p0)||0, parseFloat(p1)||parseFloat(p0)||0, parseFloat(p2)||parseFloat(p1)||parseFloat(p0)||0]
        };
        const pk = parseFloat(pack); if(pk>0) item.pack=pk;
        const existing = rule.mats.find(m=>m.n.toLowerCase()===item.n.toLowerCase());
        if(existing) Object.assign(existing, item); else rule.mats.push(item);
        n++;
      });
      saveMats();
    }
    if(tab===1){
      dataRows.forEach(c=>{
        if(c.length<2) return;
        const [t, add, q, addYes] = c;
        if(!t||!add) return;
        const rule = { t:t.trim().toLowerCase(), add: add.split(/[,|]/).map(s=>s.trim()).filter(Boolean) };
        if(q && q.trim()){ rule.q=q.trim(); rule.addYes=(addYes||"").split(/[,|]/).map(s=>s.trim()).filter(Boolean); }
        const idx = LINKS.findIndex(r=>r.t===rule.t);
        if(idx>=0) LINKS[idx]=rule; else LINKS.push(rule);
        n++;
      });
      saveLinks();
    }
    if(tab===2){
      dataRows.forEach(c=>{
        if(c.length<2) return;
        const [t, per] = c;
        const p = parseFloat(per);
        if(!t || !(p>0)) return;
        const key=t.trim().toLowerCase();
        const idx = TIMES.findIndex(r=>r.t===key);
        if(idx>=0) TIMES[idx].per=p; else TIMES.push({t:key, per:p});
        n++;
      });
      saveTimes();
    }
    closeAll(); after();
    toast(n? `Додано/оновлено ${n} рядків` : "Не знайшов підходящих рядків");
  };
  sheet.querySelector("#riCancel").onclick=closeAll;
  overlay.classList.add("open"); sheet.classList.add("open");
}

function buildLines(c){
  const rooms=[];
  c.rooms.forEach(rm=>{
    const dimsStr=[rm.d.l,rm.d.w,rm.d.h].filter(Boolean).join("×")+" м";
    const lines=rm.works.filter(wk=>wk.w&&qtyOf(rm,wk)>0).map(wk=>({
      n:wk.w.n+(wk.w.coats?" (2 шари)":""),
      dims:parseFloat(wk.manual)>0? "вручну" : dimsStr,
      q:qtyOf(rm,wk), u:wk.w.u, p:unitPrice(rm,wk)*modMult(rm,wk), s:workSum(rm,wk)
    }));
    if(lines.length) rooms.push({name:rm.name, notes:rm.notes, lines, sum:roomSum(rm)});
  });
  return rooms;
}

/* PDF — справжнє скачування файлу, без діалогу друку. Клієнту показуємо тільки фінальні
   ціни: жодних модифікаторів чи відсотка націнки/знижки — вони вже "заховані" в цифрах. */
function buildClientHtml(c){
  const rooms=buildLines(c);
  if(!rooms.length) return null;
  const d=new Date().toLocaleDateString("uk-UA");
  let html=`
    <div class="p-head">
      <div class="logo">Vostrum<span>Bud</span><div style="font-size:11px;font-weight:normal;color:#666;letter-spacing:.15em">БУДІВНИЦТВО ТА РЕМОНТ</div></div>
      <div class="contact">${COMPANY.phone?esc(COMPANY.phone)+"<br>":""}${d}</div>
    </div>
    <div class="p-meta">
      <b>Кошторис робіт</b><br>
      Замовник: ${esc(c.name)}${c.phone?", тел. "+esc(c.phone):""}<br>
      ${c.address?"Об'єкт: "+esc(c.address):""}
    </div>
    <table class="p-tbl">
      <tr><th style="width:44%">Робота</th><th>Розміри</th><th>Обсяг</th><th>Ціна, грн</th><th>Сума, грн</th></tr>`;
  rooms.forEach(rm=>{
    html+=`<tr class="p-room"><td colspan="4">${esc(rm.name)}</td><td class="r">${fmt(rm.sum)}</td></tr>`;
    rm.lines.forEach(l=>{
      html+=`<tr><td>${esc(l.n)}</td><td>${l.dims}</td><td class="r">${fmt(l.q)} ${l.u}</td><td class="r">${fmt(l.p)}</td><td class="r">${fmt(l.s)}</td></tr>`;
    });
  });
  html+=`</table>`;
  const mt = matTotals(c);
  if(mt.list.length){
    html+=`<div class="p-title">Матеріали (рівень: ${TIER_NAMES[c.tier===undefined?1:c.tier].toLowerCase()})</div>
    <table class="p-tbl">
      <tr><th style="width:52%">Матеріал</th><th>Кількість</th><th>Сума, грн</th></tr>`;
    mt.list.forEach(m=>{
      html+=`<tr><td>${esc(m.n)}</td><td class="r">${m.packs!==null? m.packs+" уп ("+fmt(m.buyQty)+" "+m.u+")" : fmt(m.buyQty)+" "+m.u}</td><td class="r">${fmt(m.client)}</td></tr>`;
    });
    html+=`</table>`;
  }
  const dd = clientDays(c);
  html+=`<div class="p-totals">
      Роботи: ${fmt(clientTotal(c))} грн${mt.list.length?`<br>Матеріали: ${fmt(mt.client)} грн`:""}
      ${dd>0?`<br>Орієнтовний строк виконання: ~${fmt(dd)} роб. дн.`:""}
      <br><b>Разом до сплати: ${fmt(clientTotal(c)+mt.client)} грн</b>
    </div>
    <div class="p-foot">${esc(COMPANY.note)}</div>`;
  return html;
}

async function exportPdf(){
  const c=client();
  const html=buildClientHtml(c);
  if(!html){ toast("Немає жодної роботи з розмірами."); return; }
  if(!window.jspdf || !window.html2canvas){
    toast("Потрібен інтернет — бібліотека для PDF ще не завантажилась. Спробуй ще раз.");
    return;
  }
  toast("Формую PDF…");
  const area=document.getElementById("printArea");
  area.innerHTML=html;
  try{
    const canvas = await html2canvas(area, {scale:2, backgroundColor:"#ffffff", useCORS:true});
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF("p","mm","a4");
    const pageW=210, marginX=10, imgW=pageW-marginX*2;
    const imgH=canvas.height*imgW/canvas.width;
    const pageH=297, usableH=pageH-16;
    let heightLeft=imgH, position=8;
    const imgData=canvas.toDataURL("image/png");
    doc.addImage(imgData,"PNG",marginX,position,imgW,imgH);
    heightLeft-=usableH;
    while(heightLeft>0){
      position = heightLeft - imgH + 8;
      doc.addPage();
      doc.addImage(imgData,"PNG",marginX,position,imgW,imgH);
      heightLeft-=usableH;
    }
    const fname=`Кошторис_${(c.name||"Клієнт").replace(/[^\wа-яіїєґА-ЯІЇЄҐ ]+/g,"").trim()||"VostrumBud"}.pdf`;
    doc.save(fname);
    toast("PDF збережено");
  }catch(e){
    toast("Не вдалося сформувати PDF. Спробуй ще раз.");
  }
}

function copyText(){
  const c=client();
  const rooms=buildLines(c);
  if(!rooms.length){ toast("Немає жодної роботи з розмірами."); return; }
  let t=`VostrumBud — кошторис\nЗамовник: ${c.name}\n${c.address?("Об'єкт: "+c.address+"\n"):""}\n`;
  rooms.forEach(rm=>{
    t+=`— ${rm.name.toUpperCase()}\n`;
    rm.lines.forEach(l=>{ t+=`  ${l.n}: ${fmt(l.q)} ${l.u} × ${fmt(l.p)} = ${fmt(l.s)} грн\n`; });
    t+=`  Разом: ${fmt(rm.sum)} грн\n`;
  });
  const mt = matTotals(c);
  if(mt.list.length){
    t+=`\n— МАТЕРІАЛИ (${TIER_NAMES[c.tier===undefined?1:c.tier].toLowerCase()})\n`;
    mt.list.forEach(m=>{ t+=`  ${m.n}: ${m.packs!==null? m.packs+" уп" : fmt(m.buyQty)+" "+m.u} = ${fmt(m.client)} грн\n`; });
    t+=`  Разом матеріали: ${fmt(mt.client)} грн\n`;
  }
  t+=`\nДО СПЛАТИ: ${fmt(clientTotal(c)+mt.client)} грн\n\n${COMPANY.note}`;
  const done=()=>toast("Скопійовано — встав у Viber/Telegram.");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t,done));
  } else fallbackCopy(t,done);
}
function fallbackCopy(t,done){
  const ta=document.createElement("textarea");
  ta.value=t; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); done(); }catch(e){ toast("Не вдалося скопіювати"); }
  ta.remove();
}
